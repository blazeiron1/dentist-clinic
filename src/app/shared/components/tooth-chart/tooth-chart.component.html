<div class="tooth-chart-wrapper" [class.readonly]="readonly()">
  <svg
    [attr.viewBox]="'0 0 ' + svgW + ' ' + svgH"
    [attr.width]="svgW"
    [attr.height]="svgH"
    role="group"
    aria-label="Dental tooth chart"
    class="tooth-chart-svg"
  >
    <!-- Divider lines -->
    <!-- Vertical midline -->
    <line x1="260" y1="20" x2="260" y2="460" class="divider" />
    <!-- Horizontal midline -->
    <line x1="40" y1="240" x2="480" y2="240" class="divider" />

    <!-- Quadrant labels -->
    <text x="130" y="18" class="quadrant-label">Q1 (Upper Right)</text>
    <text x="285" y="18" class="quadrant-label">Q2 (Upper Left)</text>
    <text x="130" y="476" class="quadrant-label">Q4 (Lower Right)</text>
    <text x="285" y="476" class="quadrant-label">Q3 (Lower Left)</text>

    @for (id of allTeeth; track id) {
      @let pos = positions.get(id)!;
      @let r = toothSize(id);
      @let selected = isSelected()(id);
      @let iColor = interventionColor(id);
      @let label = labelOffset(id);

      <g
        [id]="'tooth-' + id"
        class="tooth-group"
        [class.selected]="selected"
        [class.has-intervention]="!!iColor"
        [class.readonly]="readonly()"
        [attr.tabindex]="readonly() ? -1 : 0"
        role="checkbox"
        [attr.aria-checked]="selected"
        [attr.aria-label]="'Tooth ' + id"
        (click)="toggle(id)"
        (keydown)="onKeydown($event, id)"
        (focus)="focusedTooth.set(id)"
      >
        <!-- outer ring shown when selected -->
        @if (selected) {
          <circle
            [attr.cx]="pos.cx"
            [attr.cy]="pos.cy"
            [attr.r]="r + 5"
            class="selection-ring"
          />
        }

        <!-- tooth body -->
        <circle
          [attr.cx]="pos.cx"
          [attr.cy]="pos.cy"
          [attr.r]="r"
          class="tooth-body"
          [style.fill]="iColor ? iColor + '55' : null"
          [style.stroke]="iColor ?? null"
        />

        <!-- inner detail lines to mimic molar grooves for larger teeth -->
        @if (r >= 18) {
          <line
            [attr.x1]="pos.cx - r * 0.35"
            [attr.y1]="pos.cy - r * 0.3"
            [attr.x2]="pos.cx + r * 0.35"
            [attr.y2]="pos.cy + r * 0.3"
            class="groove"
          />
          <line
            [attr.x1]="pos.cx + r * 0.35"
            [attr.y1]="pos.cy - r * 0.3"
            [attr.x2]="pos.cx - r * 0.35"
            [attr.y2]="pos.cy + r * 0.3"
            class="groove"
          />
        }

        <!-- FDI number label -->
        <text
          [attr.x]="pos.cx + label.dx"
          [attr.y]="pos.cy + label.dy"
          class="tooth-label"
          [class.selected-label]="selected"
        >{{ id }}</text>
      </g>
    }
  </svg>
</div>
