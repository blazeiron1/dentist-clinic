<div class="tooth-chart-wrapper" [class.readonly]="readonly()">
  <svg [attr.viewBox]="'0 0 ' + svgW + ' ' + svgH"
       [attr.width]="svgW" [attr.height]="svgH"
       class="tooth-svg" role="group" aria-label="Dental chart">

    <!-- Midline -->
    <line [attr.x1]="midX" y1="25" [attr.x2]="midX" y2="525" class="divider" />

    <!-- Quadrant labels -->
    <text x="145" y="18" class="q-label">Горе десно (Q1)</text>
    <text x="355" y="18" class="q-label">Горе лево (Q2)</text>
    <text x="145" y="540" class="q-label">Долу десно (Q4)</text>
    <text x="355" y="540" class="q-label">Долу лево (Q3)</text>

    @for (t of teeth; track t.id) {
      @let sel = isSelected()(t.id);
      @let iColor = interventionColor(t.id);

      <g class="tooth-group"
         [class.selected]="sel"
         [class.has-intervention]="!!iColor"
         [class.readonly]="readonly()"
         [id]="'tooth-' + t.id"
         [attr.tabindex]="readonly() ? -1 : 0"
         role="checkbox"
         [attr.aria-checked]="sel"
         [attr.aria-label]="'Tooth ' + t.id"
         (click)="toggle(t.id)"
         (keydown)="onKeydown($event, t.id)"
         (focus)="focusedTooth.set(t.id)">

        <!-- Rotated tooth shape -->
        <g [attr.transform]="'translate(' + t.cx + ',' + t.cy + ') rotate(' + t.rot + ')'">
          <!-- Selection ring -->
          @if (sel) {
            <rect [attr.x]="-(t.w / 2 + 4)" [attr.y]="-(t.h / 2 + 4)"
                  [attr.width]="t.w + 8" [attr.height]="t.h + 8"
                  [attr.rx]="t.r + 2" class="selection-ring" />
          }

          <!-- Tooth body -->
          <rect [attr.x]="-(t.w / 2)" [attr.y]="-(t.h / 2)"
                [attr.width]="t.w" [attr.height]="t.h"
                [attr.rx]="t.r" class="tooth-body"
                [style.fill]="iColor ? iColor + '44' : null"
                [style.stroke]="iColor ?? null" />

          <!-- Molar grooves (cross pattern) -->
          @if (t.pos >= 6) {
            <path [attr.d]="t.grooveH" class="groove" />
            <path [attr.d]="t.grooveV" class="groove" />
          }
          <!-- Premolar groove (horizontal line) -->
          @if (t.pos === 4 || t.pos === 5) {
            <path [attr.d]="t.grooveH" class="groove" />
          }
          <!-- Canine dot -->
          @if (t.pos === 3) {
            <circle cx="0" cy="0" r="2.5" class="groove-dot" />
          }
        </g>

        <!-- FDI number label (unrotated, outside tooth) -->
        <text [attr.x]="t.labelX" [attr.y]="t.labelY"
              class="tooth-label" [class.sel-label]="sel">
          {{ t.id }}
        </text>
      </g>
    }
  </svg>

  @if (!readonly() && selectedTeeth().length > 0) {

  }
</div>
