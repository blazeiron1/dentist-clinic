<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-header">
        <mat-icon class="login-icon">medical_services</mat-icon>
        <mat-card-title>DentoCare</mat-card-title>
        <mat-card-subtitle>Стоматолошка ординација</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>
      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Е-пошта</mat-label>
        <input matInput type="email" [(ngModel)]="email" (ngModelChange)="email.set($event)" />
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Лозинка</mat-label>
        <input matInput [type]="hidePassword() ? 'password' : 'text'"
               [(ngModel)]="password" (ngModelChange)="password.set($event)" />
        <button mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" type="button">
          <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button color="primary" class="full-width login-btn" (click)="submit()">
        Најави се
      </button>
    </mat-card-actions>
  </mat-card>
</div>
